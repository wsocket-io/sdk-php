name: Publish to Packagist

on:
  release:
    types: [published]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
      - run: composer validate --strict
      - run: composer install --no-interaction --prefer-dist
      - name: Verify package
        run: |
          echo "✅ Package verified. Packagist auto-syncs from GitHub."
          echo "Ensure the Packagist webhook is configured in this GitHub repo."
          echo "See: https://packagist.org/about#how-to-update-packages"
